<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        // 빈 문자열로 시작: 뒤에서 h1 조각들을 이어 붙일 그릇. ''이면 첫 덧셈도 문제 없음.
        let output = '';
        for (let i = 0; i < 10; i++) {
          // 문자열을 계속 더해 하나의 긴 HTML 문자열을 만든다. 배열이 아니라 단순 문자열 누적.
          output += '<h1>Header-' + i + '</h1>';
        }
        // textContent: 태그를 글자로만 보여줌 (주석 처리).
        // innerHTML: 문자열을 HTML로 해석해서 실제 h1 요소 10개로 렌더링.
        document.body.innerHTML = output;
      };
    </script>
  </head>
  <body></body>
</html>
