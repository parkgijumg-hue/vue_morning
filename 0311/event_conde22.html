<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Basic (inline alert)</title>
  </head>
  <body>
    <!-- 인라인 방식: 태그 안에 바로 JS 작성. 가장 짧지만 HTML과 JS가 뒤섞임 -->

  </body>
</html>
