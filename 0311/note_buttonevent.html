<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
      }
      .row label {
        width: 60px;
        text-align: right;
      }
      .row button {
        width: 60px;
        text-align: center;
      }
    </style>
    <script>
      function plus() {
        // .value: input 요소 안의 사용자 입력 문자열을 꺼낸다.
        n1 = document.getElementById('n1').value;
        alert('숫자1의입력값은' + n1);
        n2 = document.getElementById('n2').value;
        alert('숫자2의입력값은' + n2);

        // parseInt: 문자열 -> 정수. 문자열 그대로 더하면 '34'가 되므로 숫자로 변환.
        n11 = parseInt(n1);
        n22 = parseInt(n2);
        alert(n11 + n22);
      }
      function login() {
        user = document.getElementById('user').value;
        pw = document.getElementById('pw').value;

        if (user == 'root' && pw == '1234') {
          alert('로그인 성공');
        } else {
          alert('로그인 실패');
        }
      }
    </script>
  </head>
  <body>
    <!-- 숫자1: <input type="text" id="n1" /><br />
    숫자2: <input type="text" id="n2" /><br />
    <button onclick="plus()">더하기</button>
    <hr />
    아이디:<input type="text" id="user" /><br />
    패스워드:<input type="text" id="pw" /><br />
    <button onclick="login()">로그인</button> -->

    <div class="row">
      <label for="n1">숫자1:</label>
      <input type="text" id="n1" />
    </div>

    <div class="row">
      <label for="n2">숫자2:</label>
      <input type="text" id="n2" />
    </div>

    <div class="row">
      <!-- onclick: 이 버튼을 클릭하면 plus() 함수를 실행 -->
      <button onclick="plus()">더하기</button>
    </div>
    <div class="row">
      <label for="user">아이디:</label>
      <input type="text" id="user" />
    </div>
    <div class="row">
      <label for="pw">패스워드:</label>
      <input type="text" id="pw" />
    </div>
    <div class="row">
      <!-- onclick: 이 버튼을 클릭하면 login() 함수를 실행 -->
      <button onclick="login()">로그인</button>
    </div>
  </body>
</html>
