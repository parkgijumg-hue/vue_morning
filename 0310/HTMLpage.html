<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 자바스크립트 주석, 한줄짜리
      // 램에 저장공간인 변수 만들기
      var age = 100; // 대입(할당)) 연산자(기호라는 의미)
      age = 200; // var 생략가능
      age = 'young';
      // js는 벼누에 데이터타입(유형)이 고정되지 않고, 아무 타입이나 넣어도 됨
      // 할당할 수 있는 데이터타입이 동적이다. -> 동적할당
      //   숫자를 따옴표 없이 사용하는 경우에는 자릿수가 의미가 있거나 계산할 목적이 있어야함.
      weight = 99.9; // -> 숫자로 계산하고,비교할 때는 따옴표빼고 사용
      //  소숫점들어간 숫자를 실수(float)이라고 함
      height = 185.7; // -> 실수
      name = '홍길동';
      food = true; // true -> 맞을때  false ->  틀릴때
      // boolean(논리형)
      //자바스크립트는 브라우저에서 실행됨
      // 브라우저의 각 부분을 나타내는 부품(객체)이 따로 있음
      //브라우저 전체 부품 -> window(생략가능))
      //브라우저 body -> document
      //브라우저 f12 console -> console
      //window.alert(); // window.alert() = alert() -> 브라우저위에 조그마한 창을 띄우는 기능을 가진 명령어
      // window.은 생략가능
      result = 'no';
      //f12(개발자 도구) 의 콘솔에서 개발자들은 값을 확인 많이 함.
      // 해당하는 부품 사용하면 됨.
      //js코드에서 console 이라고 치면 f12의 console로 인식함
      console.log('콘솔 출력');
      // console 을 보려면 f12를 눌러줘야함

      // 코드 작성시 네모부분이 나오면 자동완성 가능

      //document로 js코드에서 치면 body태그로  인식
      document.write('바디 출력');
    </script>
  </head>
  <button style="background-color: yellow">나를 눌러봐.</button>

  <body></body>
</html>
