<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let date = new Date();
      let month = date.getMonth() + 1;

      if (3 <= month && month <= 5) {
        alert('spring');
      } else if (5 < month && month <= 8) {
        alert('summer');
      } else if (8 < month && month <= 11) {
        alert('fall');
      } else {
        alert('winter');
      }
    </script>
  </head>
  <body></body>
</html>
