<!doctype html>
<!--
  style_2.html
  체크박스 상태에 따라 버튼의 CSS 클래스를 동적으로 적용하는 예제입니다.
  :class와 v-model을 같이 사용합니다.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일 화면에서 레이아웃이 깨지지 않도록 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 버튼 색상 전용 클래스 */
      .buttonColor {
        background-color: aqua;
        color: black;
      }

      /* 버튼 레이아웃(정렬/폭) 전용 클래스 */
      .buttonLayout {
        text-align: center;
        width: 120px;
      }

      /* 기본 테두리 */
      .staticBorder {
        border: khaki dashed 1px;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <!-- 체크박스와 isMyLayout을 양방향 바인딩 -->
      <input type="checkbox" v-model="isMyLayout" />
      레이아웃 적용 여부<br />
      <!--
        CSS를 적용할 때는 :class로 바인딩할 수 있음
        배열로 여러 클래스를 동시에 적용 가능
        - staticBorder: 항상 고정 적용
        - myColor: 데이터에 저장된 클래스 이름 적용
        - myLayout: isMyLayout이 true일 때만 적용
      -->
      <button class="staticBorder" :class="[myColor, isMyLayout? myLayout:'']">
        버튼
      </button>
    </div>
    <!-- Vue 라이브러리 로드 -->
    <script src="https://unpkg.com/vue"></script>
    <script>
      // Vue 앱 생성
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            // CSS 클래스 이름을 문자열로 저장
            myColor: 'buttonColor',
            myLayout: 'buttonLayout',
            // 체크박스 상태 (true면 레이아웃 클래스 적용)
            isMyLayout: false,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
