<!doctype html>
<!--
  style_1.html
  간단한 CSS 클래스 정의와 Vue 데이터(문자열)를 준비한 예제입니다.
  아직 화면에서 클래스를 바인딩하지는 않았고, "준비 단계"에 해당합니다.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일에서도 비율이 깨지지 않도록 뷰포트를 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 버튼 색상 전용 클래스 */
      .buttonColor {
        background-color: aqua;
        color: black;
      }

      /* 버튼 레이아웃(정렬/폭) 전용 클래스 */
      .buttonLayout {
        text-align: center;
        width: 120px;
      }

      /* 고정 테두리 스타일 */
      .staticBorder {
        border: khaki dashed 1px;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <!-- 체크박스: 레이아웃 적용 여부를 사용할 예정 -->
      <input type="checkbox" />
      레이아웃 적용 여부<br />
      <!-- 아직 클래스 바인딩은 하지 않은 기본 버튼 -->
      <button>버튼</button>
    </div>
    <!-- Vue 라이브러리 로드 -->
    <script src="https://unpkg.com/vue"></script>
    <script>
      // Vue 앱 생성
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            // CSS 클래스 이름을 문자열로 저장해 둠
            // 나중에 :class로 연결할 때 사용하기 위한 준비값
            myColor: 'buttonColor',
            myLayout: 'buttonLayout',
            // 체크박스 상태를 담아둘 변수(아직 화면에 연결하진 않음)
            isMyLayout: false,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
