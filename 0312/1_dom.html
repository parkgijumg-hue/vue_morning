<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0;
        text-align: left;
      }
      .row label {
        width: 140px;
        text-align: left;
      }
      .row input {
        flex: 1;
        max-width: 240px;
      }
    </style>
    <script>
      window.onload = function () {
        // HTML 인라인 이벤트에서 호출되도록 전역에 붙임
        window.webtoon = function () {
          // .value: input 요소에 사용자가 입력한 "문자열 값"을 꺼냄
          const webtoonValue = document.getElementById('webtoon').value;
          // web: 선택된 웹툰의 titleId를 담을 변수(아직 값이 없어서 빈 문자열로 시작)
          let web = '';
          if (webtoonValue === '독립일기') {
            web = '732955';
          } else if (webtoonValue === '육아일기') {
            web = '732955';
          } else {
            web = '749456';
          }
          // location.href: 브라우저 주소를 바꿔서 해당 페이지로 이동
          location.href =
            // 문자열 + 변수: URL 뒤에 입력값을 붙여 검색/이동용 주소를 완성
            'https://comic.naver.com/webtoon/list.nhn?titleId=' + web;
        };
        window.naver = function () {
          // input의 현재 입력값을 문자열로 가져옴
          const naverValue = document.getElementById('na').value;
          // 입력값을 query 파라미터로 붙여 지식인 검색 결과로 이동
          location.href =
            'https://kin.naver.com/search/list.nhn?query=' + naverValue;
        };
        window.go = function () {
          location.href = 'page02.html';
        };
        window.user = function () {
          alert('ok');
          // 입력값을 읽고, 결과 표시할 div를 찾는다
          const userValue = document.getElementById('user').value;
          const result = document.getElementById('result');
          if (userValue === 'root') {
            // innerHTML: 태그를 포함한 문자열을 실제 HTML로 넣음
            result.innerHTML = '<font color=red>아이디  성공</font>';
          } else {
            result.innerHTML =
              '<font  color=blue>아이디  실패/재로그인해주세요.</font>';
          }
        };

        // Enter 키를 눌렀을 때도 각 함수가 실행되도록 연결
        const userInput = document.getElementById('user');
        const naverInput = document.getElementById('na');
        const webtoonInput = document.getElementById('webtoon');

        userInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') window.user();
        });
        naverInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') window.naver();
        });
        webtoonInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') window.webtoon();
        });
      };
    </script>
  </head>
  <body>
    <div class="row">
      <label for="user">아이디</label>
      <input type="text" onblur="user()" id="user" />
    </div>

    <br />
    <div id="result"></div>
    <hr />
    <div class="row">
      <label for="na">지식인 검색어</label>
      <input type="text" id="na" onblur="naver()" />
    </div>

    <hr />
    <div class="row">
      <label for="na">보고 싶은 웹툰 입력</label>
      <input type="text" id="webtoon" onblur="webtoon()" />
    </div>
